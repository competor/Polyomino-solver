<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<title>Polyomino Puzzle Editor & Solver</title>

<style>
body { font-family:sans-serif; }

.board {
  display:grid;
  gap:0;
  margin:15px 0;
}

.cell {
  width:30px; height:30px;
  border:1px solid #aaa;
  background:#eee;
}

.gapV { width:6px; height:30px; background:#ccc; cursor:pointer; }
.gapH { width:30px; height:6px; background:#ccc; cursor:pointer; }
.gapC { width:6px; height:6px; background:#ddd; }

.wall { background:#000 !important; }

.editor {
  display:grid;
  gap:1px;
  margin:10px 0;
}

.editorCell {
  width:24px; height:24px;
  border:0px solid #888;
  background:#eee;
  cursor:pointer;
  margin:10;
}

.solutionWrap{
  display:flex;
  gap:20px;
  margin-top:10px;
}
</style>

</head>

<body>

<h3>盤面初期化</h3>
横 <input id="wInput" type="number" value="6">
縦 <input id="hInput" type="number" value="6">
<button onclick="initBoard()">初期化</button>

<h3>盤面エディタ</h3>
<div id="board" class="board"></div>

<h3>ピース編集</h3>
<div id="editor" class="editor"></div>
<button onclick="addPiece()">ピース追加</button>

<h3>ピース一覧</h3>
<div id="pieceList"></div>

<hr>
<div>
  <label>
    <input type="checkbox" id="noSameAdj" checked>
   同ピースの隣接を禁止する
  </label>
</div>
<button onclick="solve()">解答チェック</button>

<div id="result"></div>
<div id="solutions"></div>

<script>

// ===== 状態 =====
let W=6,H=6,N=5;
let exists, board, vWalls, hWalls;
let pieces=[];
let pieceVariants=[];
let minPieceSize = 1;

// ===== 初期化 =====
function initBoard(){
  W = parseInt(wInput.value);
  H = parseInt(hInput.value);

  exists = Array.from({length:H},()=>Array(W).fill(true));
  board  = Array.from({length:H},()=>Array(W).fill(-1));

  vWalls = Array.from({length:H},()=>Array(W+1).fill(false));
  hWalls = Array.from({length:H+1},()=>Array(W).fill(false));

  drawBoard();
}
initBoard();

// ===== 盤面描画 =====
function drawBoard(){
  const el=document.getElementById("board");
  el.innerHTML="";

  let cols=[], rows=[];
  for(let i=0;i<W;i++){ cols.push("30px"); if(i!=W-1) cols.push("6px"); }
  for(let i=0;i<H;i++){ rows.push("30px"); if(i!=H-1) rows.push("6px"); }

  el.style.gridTemplateColumns=cols.join(" ");
  el.style.gridTemplateRows=rows.join(" ");

  for(let y=0;y<H*2-1;y++){
    for(let x=0;x<W*2-1;x++){

      if(x%2==0 && y%2==0){
        let cx=x/2, cy=y/2;
        let d=document.createElement("div");
        d.className="cell";
        d.style.background = exists[cy][cx] ? "#eee" : "#444";

        d.onclick=()=>{
          exists[cy][cx]=!exists[cy][cx];
          drawBoard();
        };

        el.appendChild(d);
      }

      else if(x%2==1 && y%2==0){
        let cx=(x-1)/2, cy=y/2;
        let d=document.createElement("div");
        d.className="gapV";
        if(vWalls[cy][cx+1]) d.classList.add("wall");

        d.onclick=()=>{
          vWalls[cy][cx+1]=!vWalls[cy][cx+1];
          drawBoard();
        };

        el.appendChild(d);
      }

      else if(x%2==0 && y%2==1){
        let cx=x/2, cy=(y-1)/2;
        let d=document.createElement("div");
        d.className="gapH";
        if(hWalls[cy+1][cx]) d.classList.add("wall");

        d.onclick=()=>{
          hWalls[cy+1][cx]=!hWalls[cy+1][cx];
          drawBoard();
        };

        el.appendChild(d);
      }

      else{
        let d=document.createElement("div");
        d.className="gapC";
        el.appendChild(d);
      }
    }
  }
}

// ===== ピースエディタ =====
let editor = Array.from({length:N},()=>Array(N).fill(0));

function drawEditor(){
  const el=document.getElementById("editor");
  el.innerHTML="";
  el.style.gridTemplateColumns=`repeat(${N},24px)`;

  for(let y=0;y<N;y++){
    for(let x=0;x<N;x++){
      let d=document.createElement("div");
      d.className="editorCell";
      d.style.background=editor[y][x]?"#222":"#eee";

      d.onclick=()=>{
        editor[y][x]^=1;
        drawEditor();
      };

      el.appendChild(d);
    }
  }
}
drawEditor();

function addPiece(){
  let cells=[];
  for(let y=0;y<N;y++){
    for(let x=0;x<N;x++){
      if(editor[y][x]) cells.push([x,y]);
    }
  }
  if(cells.length>0){
    pieces.push(cells);
    pieceVariants.push(transforms(cells));
  }
  drawPieces();
}

function drawPieces(){
  const el=document.getElementById("pieceList");
  el.innerHTML="";
  pieces.forEach((p,i)=>{
    let d=document.createElement("div");
    d.innerText="Piece "+i+" ";
    let btn=document.createElement("button");
    btn.innerText="削除";
    btn.onclick=()=>{
      pieces.splice(i,1);
      pieceVariants.splice(i,1);
      drawPieces();
    };
    d.appendChild(btn);
    el.appendChild(d);
  });
}

// ===== 変換 =====
function normalize(cells){
  let minX=Math.min(...cells.map(v=>v[0]));
  let minY=Math.min(...cells.map(v=>v[1]));
  return cells.map(([x,y])=>[x-minX,y-minY]);
}

function rotate(cells){ return cells.map(([x,y])=>[y,-x]); }
function flip(cells){ return cells.map(([x,y])=>[-x,y]); }

function rotateN(cells,n){
  let r=cells;
  for(let i=0;i<n;i++) r=rotate(r);
  return r;
}

function transforms(cells){
  let res=[], seen=new Set();

  for(let i=0;i<8;i++){
    let base = (i<4)? rotateN(cells,i) : rotateN(flip(cells),i-4);
    let norm = normalize(base).sort((a,b)=>a[0]-b[0]||a[1]-b[1]);
    let key=JSON.stringify(norm);
    if(!seen.has(key)){
      seen.add(key);
      res.push(norm);
    }
  }
  return res;
}

// ===== 配置チェック =====
function canPlace(shape,x0,y0,type){
  let set=new Set();

  for(let [dx,dy] of shape){
    let x=x0+dx,y=y0+dy;
    if(x<0||y<0||x>=W||y>=H) return false;
    if(!exists[y][x]) return false;
    if(board[y][x]!=-1) return false;
    set.add(x+","+y);
  }

  const forbidAdj = document.getElementById("noSameAdj").checked;

  for(let [dx,dy] of shape){
    let x=x0+dx,y=y0+dy;
    let dirs=[[1,0],[-1,0],[0,1],[0,-1]];

    for(let [dx2,dy2] of dirs){
      let nx=x+dx2,ny=y+dy2;
      if(nx<0||ny<0||nx>=W||ny>=H) continue;

      let inside=set.has(nx+","+ny);

      let wall =
        (dx2==1 && vWalls[y][x+1]) ||
        (dx2==-1 && vWalls[y][x]) ||
        (dy2==1 && hWalls[y+1][x]) ||
        (dy2==-1 && hWalls[y][x]);

      // 内部壁禁止
      if(inside && wall) return false;

      // ★ オプション制御
      if(forbidAdj){
        if(!inside && board[ny][nx]==type) return false;
      }
    }
  }
  return true;
}

// ===== DFS =====
let solutions=[];

function findBestCell(){
  let best=null;
  let bestCount=Infinity;

  for(let y=0;y<H;y++){
    for(let x=0;x<W;x++){
      if(!exists[y][x] || board[y][x]!=-1) continue;

      let count=0;

      for(let t=0;t<pieceVariants.length;t++){
        for(let shape of pieceVariants[t]){
          for(let [ax,ay] of shape){
            let x0=x-ax, y0=y-ay;
            if(canPlace(shape,x0,y0,t)){
              count++;
              if(count>=bestCount) break;
            }
          }
          if(count>=bestCount) break;
        }
        if(count>=bestCount) break;
      }

      if(count===0) return null; // 即詰み

      if(count < bestCount){
        bestCount = count;
        best = [x,y];
      }
    }
  }
  return best;
}

function hasDeadCell(){
  for(let y=0;y<H;y++){
    for(let x=0;x<W;x++){
      if(!exists[y][x] || board[y][x]!=-1) continue;

      let ok=false;

      for(let t=0;t<pieceVariants.length;t++){
        for(let shape of pieceVariants[t]){
          for(let [ax,ay] of shape){
            let x0=x-ax, y0=y-ay;
            if(canPlace(shape,x0,y0,t)){
              ok=true;
              break;
            }
          }
          if(ok) break;
        }
        if(ok) break;
      }

      if(!ok) return true;
    }
  }
  return false;
}

function checkRegions(){
  let visited = Array.from({length:H},()=>Array(W).fill(false));

  for(let y=0;y<H;y++){
    for(let x=0;x<W;x++){
      if(!exists[y][x] || board[y][x]!=-1 || visited[y][x]) continue;

      let size=0;
      let stack=[[x,y]];
      visited[y][x]=true;

      while(stack.length){
        let [cx,cy]=stack.pop();
        size++;

        let dirs=[[1,0],[-1,0],[0,1],[0,-1]];
        for(let [dx,dy] of dirs){
          let nx=cx+dx, ny=cy+dy;
          if(nx<0||ny<0||nx>=W||ny>=H) continue;
          if(visited[ny][nx]) continue;
          if(!exists[ny][nx] || board[ny][nx]!=-1) continue;

          visited[ny][nx]=true;
          stack.push([nx,ny]);
        }
      }

      // ★ 小さすぎる領域はNG
      if(size < minPieceSize) return false;
    }
  }
  return true;
}

function findEmpty(){
  for(let y=0;y<H;y++){
    for(let x=0;x<W;x++){
      if(exists[y][x] && board[y][x]==-1) return [x,y];
    }
  }
  return null;
}

function place(shape,x0,y0,type){
  for(let [dx,dy] of shape){
    board[y0+dy][x0+dx]=type;
  }
}
function unplace(shape,x0,y0){
  for(let [dx,dy] of shape){
    board[y0+dy][x0+dx]=-1;
  }
}

function dfs(){
  if(solutions.length>=2) return;

  let cell = findBestCell();

  if(cell === null){
    // null = 詰み or 完成
    let full=true;
    for(let y=0;y<H;y++){
      for(let x=0;x<W;x++){
        if(exists[y][x] && board[y][x]==-1){
          full=false;
          break;
        }
      }
    }
    if(full){
      solutions.push(JSON.parse(JSON.stringify(board)));
    }
    return;
  }

  let [ex,ey]=cell;

  for(let t=0;t<pieceVariants.length;t++){
    for(let shape of pieceVariants[t]){

      for(let [ax,ay] of shape){

        let x0 = ex - ax;
        let y0 = ey - ay;

        if(!canPlace(shape,x0,y0,t)) continue;

        place(shape,x0,y0,t);

        // ★ 枝刈り3連コンボ
        if(!hasDeadCell() && checkRegions()){
          dfs();
        }

        unplace(shape,x0,y0);

        if(solutions.length>=2) return;
      }
    }
  }
}

// ===== 実行 =====
function solve(){
  minPieceSize = Math.min(...pieces.map(p=>p.length));
  board = Array.from({length:H},()=>Array(W).fill(-1));
  solutions=[];

  dfs();

  result.innerText =
    solutions.length==0 ? "解なし" :
    solutions.length>1 ? "複数解あり" :
    "一意解";

  drawSolutions();
}

// ===== 描画 =====
function drawSolutions(){
  const el=document.getElementById("solutions");
  el.innerHTML="";

  let wrap=document.createElement("div");
  wrap.className="solutionWrap";

  solutions.slice(0,2).forEach((sol,i)=>{
    let g=document.createElement("div");
    g.style.display="grid";
    g.style.gridTemplateColumns=`repeat(${W},30px)`;

    for(let y=0;y<H;y++){
      for(let x=0;x<W;x++){
        let d=document.createElement("div");
        d.className="cell";

        if(!exists[y][x]) d.style.background="#444";
        else if(sol[y][x]>=0)
          d.style.background=`hsl(${sol[y][x]*70+i*40},70%,60%)`;

        g.appendChild(d);
      }
    }
    wrap.appendChild(g);
  });

  el.appendChild(wrap);
}

</script>

</body>
</html>
